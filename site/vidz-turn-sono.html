<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VIDZ TURN SONO - RUSH OPERATOR</title>
  <meta name="description" content="VIDZ TURN SONO transforme les MP4 acquis par VIDZ GRAB FAST en MP3 en conservant la provenance.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #000;
      --ink: #d8d0c0;
      --muted: #9d9688;
      --line: #302c26;
      --red: #b9221c;
      --panel: #0a0a09;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(520px, calc(100vw - 36px));
      display: grid;
      gap: 24px;
      justify-items: center;
      padding: 34px 0;
    }

    .logo {
      width: 280px;
      height: 280px;
      object-fit: contain;
      display: block;
    }

    .machine {
      width: 100%;
      display: grid;
      gap: 12px;
      padding: 22px;
      border: 4px solid var(--line);
      background: var(--panel);
    }

    .slot,
    .button {
      width: 100%;
      min-height: 62px;
      display: grid;
      place-items: center;
      border: 3px solid var(--line);
      background: #020202;
      color: var(--muted);
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .button {
      min-height: 92px;
      border-color: #641713;
      background: var(--red);
      color: #050505;
      font-size: 42px;
    }

    .status {
      color: var(--muted);
      font-family: "Courier New", monospace;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="../src/vidz_grab_fast/assets/vidz_turn_sono_logo.png" alt="VIDZ TURN SONO">
    <section class="machine" aria-label="VIDZ TURN SONO mockup">
      <div class="slot">MP4 Folder</div>
      <div class="slot">MP3 Output</div>
      <div class="button">MP3</div>
    </section>
    <div class="status">MP4 TO MP3 + SOURCE</div>
  </main>
</body>
</html>
